<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Inbox - Mada Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial;background:#000;color:#fff;height:100vh;display:flex;flex-direction:column}
.header{background:#111;padding:15px;border-bottom:2px solid #00ffcc;display:flex;justify-content:space-between;align-items:center}
.header h1{color:#00ffcc;font-size:20px}
.online{color:#51cf66;font-size:12px}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;background:#0a0a0a;border-right:1px solid #222;overflow-y:auto}
.player{padding:12px;border-bottom:1px solid #222;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.player:hover{background:#111}
.player.active{background:#003d33;border-left:3px solid #00ffcc}
.player-info{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#444}
.dot.online{background:#00ff66;box-shadow:0 0 6px #00ff66}
.unread{background:#ff4444;color:#fff;font-size:11px;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.chat{flex:1;display:flex;flex-direction:column;background:#000}
.chat-header{padding:15px;background:#111;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.messages{flex:1;overflow-y:auto;padding:15px;background:#050505}
.msg{margin:8px 0;display:flex}
.msg.me{justify-content:flex-end}
.bubble{max-width:70%;padding:10px 14px;border-radius:12px;font-size:14px;word-break:break-word}
.me .bubble{background:#003d33;color:#fff}
.them .bubble{background:#1a1a1a;color:#ddd}
.time{font-size:10px;color:#888;margin-top:4px}
.input-area{padding:15px;background:#111;border-top:1px solid #222;display:flex;gap:10px}
.input-area input{flex:1;padding:12px;background:#000;border:1px solid #333;border-radius:8px;color:#fff}
.input-area button{padding:12px 20px;background:linear-gradient(45deg,#00ffcc,#00ccff);border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:#000}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:#666}
</style>
</head>
<body>
<div class="header">
  <h1>📥 Admin Inbox</h1>
  <div class="online">● LIVE</div>
</div>
<div class="main">
  <div class="sidebar" id="playerList"><div style="padding:20px;color:#666;text-align:center">Loading players...</div></div>
  <div class="chat">
    <div class="chat-header" id="chatHeader"><span style="color:#666">Select a player</span></div>
    <div class="messages" id="messages"><div class="empty">Choose a conversation</div></div>
    <div class="input-area" id="inputArea" style="display:none">
      <input type="text" id="replyInput" placeholder="Type reply..." onkeypress="if(event.key==='Enter')sendReply()">
      <button onclick="sendReply()">Send</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyBRDfT-P8wzVAAZs8lveF1-ZTf8QlpRC5g",authDomain:"apple-green-ded09.firebaseapp.com",databaseURL:"https://apple-green-ded09-default-rtdb.firebaseio.com",projectId:"apple-green-ded09"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const ADMIN='Admin_Mada';
let currentPlayer=null;

function getChatId(a,b){return [a,b].sort().join('_');}

// Load players from leaderboard
db.ref('leaderboard_all').orderByChild('lastPlayed').limitToLast(100).on('value',snap=>{
  const players=[];
  snap.forEach(c=>{const v=c.val()||{};if(c.key!==ADMIN && !v.banned) players.push({name:c.key, coins:v.coins||0, last:v.lastPlayed||0})});
  players.sort((a,b)=>b.last-a.last);
  
  // Get presence
  db.ref('presence').once('value',pres=>{
    const online={}; pres.forEach(p=>{const v=p.val()||{}; online[p.key]=v.state==='online' && (Date.now()-(v.last||0)<120000)});
    
    // Get unread counts
    db.ref('chats').once('value',chats=>{
      let html='';
      players.slice(0,50).forEach(p=>{
        const id=getChatId(ADMIN,p.name);
        let unread=0; const chat=chats.child(id); if(chat.exists()){ chat.child('messages').forEach(m=>{const v=m.val(); if(v.to===ADMIN && v.status!=='read') unread++})}
        const isOnline=online[p.name];
        html+=`<div class="player" onclick="openChat('${p.name}')"><div class="player-info"><span class="dot ${isOnline?'online':''}"></span><div><div style="font-weight:bold">${p.name}</div><div style="font-size:11px;color:#888">${p.coins.toLocaleString()} coins</div></div></div>${unread>0?`<span class="unread">${unread}</span>`:''}</div>`;
      });
      document.getElementById('playerList').innerHTML=html||'<div style="padding:20px;color:#666">No players</div>';
    });
  });
});

function openChat(player){
  currentPlayer=player;
  document.querySelectorAll('.player').forEach(p=>p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('chatHeader').innerHTML=`<div><strong>${player}</strong> <span id="statusDot" style="font-size:11px;color:#888">checking...</span></div><button onclick="closeChat()" style="background:#333;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer">Close</button>`;
  document.getElementById('inputArea').style.display='flex';
  
  // Check online
  db.ref('presence/'+player).on('value',s=>{const v=s.val()||{}; const on=v.state==='online' && (Date.now()-(v.last||0)<120000); document.getElementById('statusDot').innerHTML=on?'<span style="color:#51cf66">● online</span>':'<span style="color:#666">offline</span>'});
  
  const id=getChatId(ADMIN,player);
  db.ref('chats/'+id+'/messages').orderByChild('timestamp').limitToLast(100).on('value',snap=>{
    let html='';
    snap.forEach(c=>{
      const m=c.val(); const me=m.from===ADMIN; const t=new Date(m.timestamp).toLocaleString();
      html+=`<div class="msg ${me?'me':'them'}"><div><div class="bubble">${String(m.text||'').replace(/</g,'&lt;')}</div><div class="time">${t} ${me?(m.status==='read'?'✓✓':'✓'):''}</div></div></div>`;
      if(m.to===ADMIN && m.status!=='read'){ db.ref('chats/'+id+'/messages/'+c.key+'/status').set('read') }
    });
    document.getElementById('messages').innerHTML=html||'<div class="empty">No messages yet</div>';
    document.getElementById('messages').scrollTop=999999;
  });
}

function sendReply(){
  if(!currentPlayer) return;
  const txt=document.getElementById('replyInput').value.trim(); if(!txt) return;
  const id=getChatId(ADMIN,currentPlayer);
  db.ref('chats/'+id+'/messages').push({from:ADMIN,to:currentPlayer,text:txt,timestamp:Date.now(),status:'sent'});
  document.getElementById('replyInput').value='';
}

function closeChat(){currentPlayer=null;document.getElementById('messages').innerHTML='<div class="empty">Choose a conversation</div>';document.getElementById('chatHeader').innerHTML='<span style="color:#666">Select a player</span>';document.getElementById('inputArea').style.display='none'}
</script>
</body>
  </html>
