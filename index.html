<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Click to Watch - Mobile</title>
<meta name="theme-color" content="#050507">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap');
* { -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #050507;
  overscroll-behavior: none;
}
.bg-grid {
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
  background-size: 22px 22px;
}
.glow {
  box-shadow: 0 0 40px rgba(34,197,94,0.25), 0 0 80px rgba(34,197,94,0.1);
}
.pulse-ring::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 9999px;
  background: rgba(34,197,94,0.4);
  animation: ping 2s cubic-bezier(0,0,0.2,1) infinite;
  z-index: -1;
}
@keyframes ping {
  75%, 100% { transform: scale(1.15); opacity: 0; }
}
</style>
</head>
<body class="text-white antialiased">
<div class="fixed inset-0 bg-grid opacity-[0.3]"></div>
<div class="fixed top-[-20%] left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-green-600/10 rounded-full blur-[120px] pointer-events-none"></div>

<main class="relative z-10 min-h-screen w-full max-w-[390px] mx-auto px-5 pt-10 pb-28 flex flex-col">
  <!-- Header -->
  <div class="text-center">
    <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/5 border border-white/10 mb-6">
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      <span class="text-[11px] tracking-widest font-semibold text-gray-300 uppercase">Malawi Mobile</span>
    </div>
    <h1 class="text-[40px] leading-none font-extrabold tracking-tight">
      Click to
      <span class="block text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-300">Watch</span>
    </h1>
    <p class="mt-3 text-[15px] text-gray-400">Tap below</p>
  </div>

  <!-- Watch Button -->
  <div class="mt-10 flex flex-col items-center">
    <button id="watchBtn" class="relative pulse-ring w-full max-w-[300px] h-[64px] bg-[#22c55e] hover:bg-[#16a34a] active:scale-[0.98] text-black font-bold text-[18px] rounded-[20px] transition-all duration-200 glow flex items-center justify-center gap-2.5 select-none">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v14l11-7-11-7z"/></svg>
      <span>Watch Video</span>
    </button>
    <p class="mt-3 text-xs text-gray-500">1 tap to start • Free</p>
  </div>

  <!-- Video Container (hidden until tap) -->
  <div id="videoContainer" class="hidden w-full mt-8">
    <div class="relative w-full aspect-video bg-black rounded-[20px] overflow-hidden border border-white/10 shadow-2xl">
      <div id="videoPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-zinc-900 to-black">
        <div class="w-14 h-14 border-[3px] border-green-500/20 border-t-green-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-[13px] text-gray-400 font-medium">Loading player...</p>
      </div>
    <div class="flex items-center justify-between mt-2.5 px-1">
      <span class="text-[11px] text-gray-500">HD • Mobile Optimized</span>
      <span class="text-[11px] text-green-400 font-medium" id="statusText">Initializing</span>
    </div>
  </div>

  <!-- 300x250 Medium Rectangle -->
  <div class="w-full flex justify-center mt-8">
    <div class="w-full max-w-[300px]">
      <p class="text-[10px] uppercase tracking-wider text-gray-600 mb-1.5 text-center">Advertisement</p>
      <div class="w-[300px] h-[250px] max-w-full mx-auto rounded-2xl bg-white/[0.03] border border-dashed border-white/15 flex flex-col items-center justify-center backdrop-blur-sm">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-gray-600 mb-2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
        <span class="text-[13px] font-semibold text-gray-500">300×250</span>
        <span class="text-[11px] text-gray-600 mt-0.5">Medium Rectangle</span>
      </div>
    </div>
  </div>

  <!-- Note -->
  <div class="mt-auto pt-8 text-center">
    <div class="inline-flex items-center gap-2 px-3.5 py-2 rounded-xl bg-amber-500/10 border border-amber-500/20">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-amber-400"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
      <p class="text-[12px] text-amber-200/90 font-medium">Best mobile sizes: 320x50 and 300x250</p>
    </div>
  </div>
</main>

<!-- Sticky 320x50 Banner -->
<div id="mobile-banner" style="position:fixed; bottom:0; left:0; right:0; z-index:9999; display:flex; justify-content:center; padding:6px 0 calc(6px + env(safe-area-inset-bottom)); background:rgba(5,5,7,0.85); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.06);">
  <div class="w-[320px] h-[50px] max-w-[calc(100vw-20px)] rounded-xl bg-white/[0.04] border border-dashed border-white/15 flex items-center justify-center gap-2">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-gray-600"><rect x="2" y="4" width="20" height="12" rx="2"/><path d="M6 16v2a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-2"/></svg>
    <span class="text-[11px] font-medium text-gray-500 tracking-wide">320×50 BANNER</span>
  </div>
</div>

<script>
const btn = document.getElementById('watchBtn');
const videoContainer = document.getElementById('videoContainer');
const videoPlaceholder = document.getElementById('videoPlaceholder');
const statusText = document.getElementById('statusText');
let loaded = false;

btn.addEventListener('click', () => {
  if (loaded) return;
  loaded = true;
  
  // UI feedback
  btn.disabled = true;
  btn.classList.remove('pulse-ring', 'glow');
  btn.innerHTML = `<svg class="animate-spin" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.2" stroke-width="3"/><path d="M12 2a10 10 0 0 1 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><span>Starting...</span>`;
  btn.classList.add('opacity-70');
  
  // Show video
  videoContainer.classList.remove('hidden');
  videoContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  // Simulate player ready
  setTimeout(() => {
    statusText.textContent = 'Player Ready';
    videoPlaceholder.innerHTML = `
      <div class="absolute inset-0">
        <img src="https://images.unsplash.com/photo-1574267432553-4b4628081c31?w=800" class="w-full h-full object-cover opacity-40" alt="">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-black/40"></div>
      </div>
      <button class="relative z-10 w-20 h-20 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white" class="ml-1"><path d="M8 5.14v14l11-7-11-7z"/></svg>
      </button>
      <p class="relative z-10 mt-4 text-sm font-semibold">Tap to Play</p>
      <p class="relative z-10 text-[11px] text-gray-400 mt-1">Ad will play first</p>
    `;
    
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20.3 7.7l-1.4z"/></svg><span>Video Ready</span>`;
    btn.classList.remove('bg-[#22c55e]', 'hover:bg-[#16a34a]');
    btn.classList.add('bg-zinc-800', 'text-gray-300');
  }, 900);
  
  // LOAD ADSTERRA SCRIPT ONLY ON TAP
  const s = document.createElement('script');
  s.src = 'https://pl29879119.effectivecpmnetwork.com/25/5f/d4/255fd4d49ed995c22b93ccd0ace3c1c9.js';
  s.async = true;
  s.onload = () => {
    statusText.textContent = 'Ad Loaded';
    statusText.classList.add('text-green-400');
  };
  document.body.appendChild(s);
  
  // Haptic feedback for mobile
  if (navigator.vibrate) navigator.vibrate(20);
});
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
         </html>
